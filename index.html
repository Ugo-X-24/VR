<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Periodic Table Interactive Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="controls-group">
        <button class="controls-btn active" data-layout="table">TABLE</button>
        <button class="controls-btn" data-layout="sphere">SPHERE</button>
        <button class="controls-btn" data-layout="helix">HELIX</button>
        <button class="controls-btn" data-layout="grid">GRID</button>
    </div>

    <div id="scene">
        <div id="scene-content" data-layout="table"></div>
    </div>

    <div id="info-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>

            <div class="modal-navigation">
                <button id="modal-prev-btn" class="nav-btn">&larr; Previous</button>
                <button id="modal-next-btn" class="nav-btn">Next &rarr;</button>
            </div>

            <div class="modal-body">
                <div class="input-group row-flex">
                    <div class="input-subgroup width-small">
                        <label>Atomic #</label>
                        <input type="text" id="modal-number" readonly title="Atomic number cannot be changed">
                    </div>
                    <div class="input-subgroup width-remain">
                        <label>Chemical Symbol</label>
                        <input type="text" id="modal-symbol" maxlength="3">
                    </div>
                </div>

                <div class="input-group">
                    <label>Replace Symbol with Image</label>
                    <input type="file" id="modal-image-upload" accept="image/*">
                </div>

                <div class="input-group">
                    <label>Subject Name</label>
                    <input type="text" id="modal-title">
                </div>

                <div class="input-group">
                    <label>Subject status</label>
                    <input type="text" id="modal-description">
                </div>

                <div class="input-group border-top-pad">
                    <label>Subject info</label>
                    <textarea id="modal-fact" rows="3"></textarea>
                </div>
            </div>
        </div>
    </div>

    <template id="element-template">
        <div class="element">
            <div class="element-number"></div>
            <div class="element-symbol"></div>
            <img class="element-image hidden" alt="Element Image">
            <div class="element-title"></div>
            <div class="element-description"></div>
        </div>
    </template>

    <script src="script.js"></script>
</body>

</html>
